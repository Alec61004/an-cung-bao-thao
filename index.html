<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Góc nhỏ của tụi mình ❤️</title>
  <meta name="description" content="Wishlist ăn uống và vui chơi cho hai đứa" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="hearts" aria-hidden="true">
    <span>❤️</span><span>🍜</span><span>☕</span><span>🎡</span><span>💕</span>
  </div>

  <main class="app-shell">
    <header class="hero">
      <button id="themeToggle" class="icon-btn" aria-label="Đổi giao diện">🌙</button>
      <p class="eyebrow">Couple wishlist</p>
      <h1>Góc nhỏ của tụi mình ❤️</h1>
      <p class="subtitle">Lưu lại món ngon, quán xinh và những chỗ muốn đi cùng nhau.</p>
      <div class="sync-row">
        <span id="syncStatus" class="sync-pill">Đang khởi động...</span>
        <button id="exportBtn" class="link-btn" type="button">Xuất dữ liệu</button>
      </div>
    </header>

    <section class="stats-grid" aria-label="Thống kê">
      <article class="stat-card"><strong id="totalCount">0</strong><span>Tất cả</span></article>
      <article class="stat-card"><strong id="todoCount">0</strong><span>Muốn thử</span></article>
      <article class="stat-card"><strong id="plannedCount">0</strong><span>Đã lên kèo</span></article>
      <article class="stat-card"><strong id="doneCount">0</strong><span>Đã đi</span></article>
    </section>

    <section class="card form-card">
      <div class="section-title">
        <div>
          <p class="eyebrow">Thêm kèo mới</p>
          <h2>Hôm nay mình muốn lưu gì?</h2>
        </div>
        <button id="randomBtn" class="secondary-btn" type="button">🎲 Random kèo</button>
      </div>

      <form id="wishlistForm" class="wish-form">
        <label>
          Tên món / địa điểm *
          <input id="itemName" type="text" required placeholder="Ví dụ: Bún bò, cafe rooftop, Đà Lạt..." />
        </label>

        <div class="two-col">
          <label>
            Loại
            <select id="itemType">
              <option value="food">🍜 Món ăn</option>
              <option value="restaurant">🍽️ Nhà hàng</option>
              <option value="cafe">☕ Cafe</option>
              <option value="play">🎡 Vui chơi</option>
              <option value="movie">🎬 Xem phim</option>
              <option value="travel">✈️ Du lịch</option>
              <option value="other">💭 Khác</option>
            </select>
          </label>

          <label>
            Trạng thái
            <select id="itemStatus">
              <option value="todo">Muốn thử</option>
              <option value="planned">Đã lên kèo</option>
              <option value="done">Đã đi</option>
              <option value="again">Muốn đi lại</option>
            </select>
          </label>
        </div>

        <div class="two-col">
          <label>
            Người thêm
            <select id="itemAddedBy">
              <option value="Anh">Anh</option>
              <option value="Em">Em</option>
              <option value="Cả hai">Cả hai</option>
            </select>
          </label>

          <label>
            Ngày muốn đi
            <input id="itemDate" type="date" />
          </label>
        </div>

        <label>
          Địa chỉ / Link
          <input id="itemLink" type="url" placeholder="Dán link Google Maps, TikTok, Facebook..." />
        </label>

        <label>
          Ghi chú
          <textarea id="itemNote" rows="3" placeholder="Ví dụ: Đi buổi tối chắc đẹp, em thích món này, nhớ đặt bàn trước..."></textarea>
        </label>

        <button class="primary-btn" type="submit">Thêm vào danh sách 💖</button>
      </form>
    </section>

    <nav class="filter-bar" aria-label="Bộ lọc">
      <button class="filter-btn active" data-filter="all">Tất cả</button>
      <button class="filter-btn" data-filter="food">🍜 Món ăn</button>
      <button class="filter-btn" data-filter="restaurant">🍽️ Nhà hàng</button>
      <button class="filter-btn" data-filter="cafe">☕ Cafe</button>
      <button class="filter-btn" data-filter="play">🎡 Vui chơi</button>
      <button class="filter-btn" data-filter="travel">✈️ Du lịch</button>
      <button class="filter-btn" data-filter="done">✅ Đã đi</button>
    </nav>

    <section id="wishlist" class="wishlist" aria-live="polite"></section>
    <section id="emptyState" class="empty-state" hidden>
      <div>🌸</div>
      <h2>Chưa có kèo nào ở đây</h2>
      <p>Hai đứa thêm món ăn hoặc địa điểm đầu tiên nha.</p>
    </section>
  </main>

  <dialog id="randomDialog" class="random-dialog">
    <div id="randomContent"></div>
    <div class="dialog-actions">
      <button id="randomAgain" class="secondary-btn" type="button">Random lại</button>
      <button id="closeDialog" class="primary-btn" type="button">Đóng</button>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
