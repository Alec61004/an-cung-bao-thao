<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ăn cùng Bảo - Thảo ❤️</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header>
    <h1>🍕 Ăn cùng Bảo - Thảo ❤️</h1>
    <p class="sub">Lưu món ngon & quán xinh muốn đi cùng nhau</p>
  </header>

  <form id="addForm" class="add-form">
    <input id="nameInput" type="text" placeholder="Tên món / quán..." required>
    <input id="linkInput" type="url" placeholder="Link Google Maps/Facebook...">
    <button class="btn" type="submit">+ Thêm</button>
  </form>

  <div id="emptyMsg" class="empty">Chưa có gì — thêm món đầu tiên đi nha 🥰</div>
  <div id="list" class="list"></div>
</div>
<script src="script.js"></script>
</body>
</html>
